name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore UnoCatorceCafe.sln
      - run: dotnet build UnoCatorceCafe.sln --configuration Release --no-restore
      - run: dotnet test UnoCatorceCafe.sln --configuration Release --no-build
